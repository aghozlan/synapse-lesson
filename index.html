<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synapse: The Cinematic Journey</title>
    <style>
        body { margin: 0; background: #000; font-family: 'Helvetica', sans-serif; overflow: hidden; }
        canvas { position: fixed; top: 0; left: 0; }
        #overlay {
            position: fixed; top: 10%; left: 5%; color: #00ffff; z-index: 10;
            border-left: 3px solid #00ffff; padding-left: 15px;
            text-transform: uppercase; letter-spacing: 2px;
        }
        #sub-text { color: white; font-size: 0.8rem; margin-top: 5px; opacity: 0.8; }
    </style>
</head>
<body>

    <div id="overlay">
        <div id="status">Initializing Simulation...</div>
        <div id="sub-text">Preparing Neural Pathway</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        let scene, camera, renderer, terminal, membrane, vesicles = [];

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // Lighting for "Real" textures
            const ambient = new THREE.AmbientLight(0x404040, 2); 
            scene.add(ambient);
            const spot = new THREE.SpotLight(0x00ffff, 2);
            spot.position.set(10, 20, 10);
            scene.add(spot);

            createAnatomy();
            startCinematic();
            animate();
        }

        function createAnatomy() {
            // 1. Organic Pre-Synaptic Terminal (The Bulb)
            const termGeom = new THREE.SphereGeometry(5, 64, 64);
            const termMat = new THREE.MeshStandardMaterial({ 
                color: 0x1a2a6c, 
                roughness: 0.2, 
                metalness: 0.3,
                transparent: true,
                opacity: 0.6
            });
            terminal = new THREE.Mesh(termGeom, termMat);
            terminal.scale.set(1, 1.4, 1);
            terminal.position.y = 10;
            scene.add(terminal);

            // 2. The Axon (The realistic connection)
            const axonGeom = new THREE.CylinderGeometry(1.5, 1.5, 20, 32);
            const axon = new THREE.Mesh(axonGeom, termMat);
            axon.position.y = 22;
            scene.add(axon);

            // 3. Vesicles (Messengers)
            const vGeom = new THREE.SphereGeometry(0.4, 32, 32);
            const vMat = new THREE.MeshStandardMaterial({ 
                color: 0xffff00, 
                emissive: 0xffff00, 
                emissiveIntensity: 1 
            });
            for(let i=0; i<15; i++) {
                const v = new THREE.Mesh(vGeom, vMat);
                v.position.set((Math.random()-0.5)*4, 10 + (Math.random()-0.5)*3, (Math.random()-0.5)*4);
                scene.add(v);
                vesicles.push(v);
            }

            // 4. Post-Synaptic Membrane (Realistic Curve)
            const memGeom = new THREE.TorusGeometry(15, 3, 16, 100, Math.PI);
            membrane = new THREE.Mesh(memGeom, termMat);
            membrane.rotation.x = Math.PI/2;
            membrane.position.y = -15;
            scene.add(membrane);

            camera.position.set(0, 10, 30);
        }

        function startCinematic() {
            const mainTl = gsap.timeline({ repeat: -1 });

            // STEP 1: Impulse Arrival
            mainTl.to("#status", { textContent: "1. Action Potential Arrival", duration: 1 });
            mainTl.to(camera.position, { y: 12, z: 20, duration: 3, ease: "power2.inOut" });

            // STEP 2: Calcium Influx (Glow effect)
            mainTl.to("#status", { textContent: "2. Calcium Influx (Ca2+)", duration: 1 });
            mainTl.to(terminal.material, { emissiveIntensity: 2, duration: 1, color: 0x00ffff });

            // STEP 3: Vesicle Docking & Release
            mainTl.to("#status", { textContent: "3. Exocytosis / Neurotransmitter Release", duration: 1 });
            vesicles.forEach((v, i) => {
                mainTl.to(v.position, { 
                    y: -14, 
                    duration: 4, 
                    ease: "power1.in",
                    delay: i * 0.1 
                }, "release");
            });
            mainTl.to(camera.position, { y: -5, z: 25, duration: 5, ease: "power2.inOut" }, "release");

            // STEP 4: Receptor Binding
            mainTl.to("#status", { textContent: "4. Receptor Binding & Signal Success", duration: 1 });
            mainTl.to(membrane.material, { emissive: 0x00ff00, emissiveIntensity: 2, duration: 1 });
            
            // RESET
            mainTl.to("#status", { textContent: "Restarting Cycle...", duration: 2 });
            mainTl.to(camera.position, { y: 10, z: 30, duration: 2 });
        }

        function animate() {
            requestAnimationFrame(animate);
            if(terminal) terminal.rotation.y += 0.002;
            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
